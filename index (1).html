      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {data.map((d, i) => { const pct = d.value / total, dash = 2 * Math.PI * r * pct, gap = 2 * Math.PI * r - dash, rot = cum * 360 - 90; cum += pct; return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={14} strokeDasharray={`${dash} ${gap}`} transform={`rotate(${rot} ${cx} ${cy})`} style={{ transition: "all .5s" }} />; })}

          completed: { bg: "#f1f5f9", color: "#64748b", label: "Đã kết thúc" }
        };
        const s = styles[status] || styles.active;
        return <span style={{ padding: "4px 10px", borderRadius: 20, fontSize: 10.5, fontWeight: 700, background: s.bg, color: s.color }}>{s.label}</span>;
      };

      const dashboardStats = [
        { label: "TỔNG CHIẾN DỊCH", val: camps.length, color: "#1a2d47" },
        { label: "ĐANG CHẠY", val: camps.filter(c => c.status === "active").length, color: "#10b981" },
        { label: "TỔNG LEAD THU ĐƯỢC", val: camps.reduce((sum, c) => sum + c.leads, 0).toLocaleString(), color: "#2563eb" },
        { label: "TỶ LỆ CHUYỂN ĐỔI", val: "18.5%", color: "#f5a623" }
      ];

      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
            <div>
              <h1 style={{ fontSize: 24, fontWeight: 900, color: "#1a2d47", marginBottom: 4 }}>Chiến dịch đã tạo</h1>
              <p style={{ fontSize: 13, color: "#64748b" }}>Quản lý và theo dõi hiệu suất các chiến dịch đang triển khai</p>
            </div>
            <button onClick={onCreateClick} style={{ background: N[800], color: "#fff", padding: "12px 24px", borderRadius: 12, border: "none", fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 12px rgba(35, 57, 93, 0.2)", display: "flex", alignItems: "center", gap: 8 }}>
              + Tạo chiến dịch mới
            </button>
          </div>

          {/* Dashboard Section */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
            {dashboardStats.map(s => (
              <div key={s.label} style={{ background: "#fff", padding: "18px 20px", borderRadius: 16, border: "1px solid #E6E8EC" }}>
                <div style={{ fontSize: 10.5, fontWeight: 800, color: "#94a3b8", marginBottom: 8, letterSpacing: 0.2 }}>{s.label}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: s.color }}>{s.val}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "#fff", borderRadius: 16, border: "1px solid #E6E8EC", overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left" }}>
              <thead>
                <tr style={{ background: "#f8fafc", borderBottom: "1px solid #E6E8EC" }}>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>TÊN CHIẾN DỊCH</th>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>LOẠI / PHỄU</th>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>THỜI GIAN</th>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>LEAD THU ĐƯỢC</th>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>TRẠNG THÁI</th>
                  <th style={{ padding: "16px 20px", fontSize: 11.5, fontWeight: 700, color: "#64748b" }}>HÀNH ĐỘNG</th>
                </tr>
              </thead>
              <tbody>
                {camps.map(c => (
                  <tr key={c.id} style={{ borderBottom: "1px solid #f1f5f9", transition: "background .2s" }} onMouseEnter={e => e.currentTarget.style.background = "#fafbfc"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <td style={{ padding: "16px 20px" }}>
                      <div onClick={() => setSelCampaign(c)} style={{ fontWeight: 800, color: "#23395d", fontSize: 14, cursor: "pointer" }}>{c.name}</div>
                      <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                        {(c.channels || []).slice(0, 2).map(ch => <span key={ch} style={{ fontSize: 9.5, color: "#94a3b8", background: "#f1f5f9", padding: "1px 6px", borderRadius: 4 }}>{ch}</span>)}
                      </div>
                    </td>
                    <td style={{ padding: "16px 20px" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#475569" }}>{c.type || "Marketing"}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8" }}>{c.funnel}</div>
                    </td>
                    <td style={{ padding: "16px 20px", fontSize: 12, color: "#64748b" }}>{c.date}</td>
                    <td style={{ padding: "16px 20px" }}>
                      <div style={{ fontWeight: 800, color: "#10b981", fontSize: 15 }}>{c.leads.toLocaleString()}</div>
                      <div style={{ fontSize: 10.5, color: "#94a3b8", fontWeight: 600 }}>Tỷ lệ: {c.conv}</div>
                    </td>
                    <td style={{ padding: "16px 20px" }}>
                      {getStatusBadge(c.status)}
                    </td>
                    <td style={{ padding: "16px 20px" }}>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => setSelCampaign(c)} title="Xem Dashboard" style={{ background: "#f1f5f9", border: "none", width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#1a2d47" }}><Icon id="reports" size={14} /></button>
                        <button title="Xem Lead" style={{ background: "#f1f5f9", border: "none", width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#1a2d47" }}><Icon id="profiles" size={14} /></button>
                        <button title="Chỉnh sửa" style={{ background: "#f1f5f9", border: "none", width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#1a2d47" }}><Icon id="edit" size={14} /></button>
                        <button title="Tạm dừng" style={{ background: "#fef3c7", border: "none", width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#b45309" }}><Icon id="pause" size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    /* ── Add Lead Modal ── */
    const MAJORS_LIST = ["Công nghệ thông tin","Điều dưỡng","Thiết kế đồ họa","Kế toán","Quản trị kinh doanh","Dược học","Kỹ thuật xây dựng","Công nghệ thực phẩm","Ngôn ngữ Anh","Marketing số","Tài chính – Ngân hàng","Luật kinh tế"];
    const SOURCES_LIST = ["Facebook","TikTok","Zalo","Website","Hotline","Facebook Ads","TikTok Ads","Sự kiện THPT","Import Excel","Giới thiệu","Mini Game","Google Ads","YouTube"];
    const ADVISORS_LIST = ["Minh Tú","Hồng Nhung","Văn Nam","Quế Anh","Bảo Khánh","Thanh Lan"];
    const PROVINCES_LIST = ["TP.HCM","Hà Nội","Bình Dương","Đồng Nai","Long An","Tiền Giang","Bà Rịa-Vũng Tàu","Cần Thơ","Đà Nẵng","Khác"];
    const FUNNELS_LIST = ["Phễu học sinh","Phễu người đi làm","Phễu phụ huynh","Phễu CTV"];
    const HOBBIES = ["Đọc sách","Đá bóng","Âm nhạc","Vẽ","Gaming","Du lịch","Nấu ăn","Thể thao","Công nghệ","Y tế"];

    const fmtPhone = (d) => {
      const x = d.replace(/\D/g,"").slice(0,10);
      if(x.length<=4) return x;
      if(x.length<=7) return x.slice(0,4)+" "+x.slice(4);
      return x.slice(0,4)+" "+x.slice(4,7)+" "+x.slice(7);
    };
    const validPhone = (v) => /^0[3-9]\d{8}$/.test(v.replace(/\s/g,""));
    const validEmail = (v) => !v || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    const AddLeadModal = ({ campaigns, onClose, onSaveNew, onSaveView }) => {
      const [f, setF] = useState({
        name:"", phone:"", email:"", school:"", province:"TP.HCM",
        major:"", source:"", campaign:"", note:"", sale:"",
        temp:"warm", funnel:"Phễu học sinh", team:"Đội 1",
        hobby:"", strength:"", orientation:"", event:"Điền form nhận tư vấn",
      });
      const [err, setErr] = useState({});
      const [touched, setTouched] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [tags, setTags] = useState([]);
      const [showTagMenu, setShowTagMenu] = useState(false);
      const nameRef = React.useRef(null);
      React.useEffect(() => { setTimeout(()=>nameRef.current?.focus(),80); }, []);

      const up = (k,v) => { setF(p=>({...p,[k]:v})); if(touched[k]) revalidate({...f,[k]:v}); };
      const touch = (k) => { setTouched(p=>({...p,[k]:true})); revalidate(f); };
      const revalidate = (fv) => {
        const e={};
        if(!fv.name.trim()) e.name="Họ tên bắt buộc";
        if(!fv.phone.trim()) e.phone="SĐT bắt buộc";
        else if(!validPhone(fv.phone)) e.phone="SĐT không hợp lệ (10 số, bắt đầu 03–09)";
        if(!validEmail(fv.email)) e.email="Email không hợp lệ";
        setErr(e); return Object.keys(e).length===0;
      };

      const buildLead = () => {
        const camp = f.campaign ? (campaigns||[]).find(c=>c.name===f.campaign) : null;
        const autoTags = [
          f.major ? "#"+f.major.split(" ").slice(0,2).join("_") : null,
          f.source ? "#"+f.source.replace(/\s/g,"_") : null,
        ].filter(Boolean);
        return {
          id:"L"+(Date.now()%1000000).toString().padStart(3,"0"),
          name:f.name.trim(), phone:f.phone.replace(/\s/g,""),
          email:f.email.trim()||"", school:f.school.trim()||"—",
          major:f.major||"Chưa chọn", source:f.source||"Khác",
          sale:f.sale||"Chưa gán", temp:f.temp, note:f.note.trim(),
          score:f.temp==="hot"?85:f.temp==="warm"?65:40,
          stage:"lead_moi", color:"#64748b",
          daysNoCall:0, daysNoEngage:0, updated:"Vừa xong",
          province:f.province, tags:[...tags,...autoTags],
          campaignId:camp?camp.id:null, campaignName:camp?camp.name:null,
          hobby:f.hobby, strength:f.strength, orientation:f.orientation,
        };
      };

      const save = (mode) => {
        setTouched({name:true,phone:true,email:true});
        if(!revalidate(f)) return;
        setSubmitting(true);
        setTimeout(()=>{ const lead=buildLead(); mode==="new"?onSaveNew(lead):onSaveView(lead); },300);
      };

      const baseInput = {width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"12px 16px",fontSize:14,outline:"none",fontFamily:"inherit",color:"#1a2d47"};
      const errInput = {...baseInput,border:"1px solid #ef4444"};
      const okInput = {...baseInput,border:"1px solid #10b981"};
      const inp = (k) => err[k]&&touched[k] ? errInput : touched[k]&&!err[k] ? okInput : baseInput;
      const lbl = {display:"block",fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8};

      const tempOpts=[{k:"hot",label:"● Nóng",color:"#ef4444",bg:"#fee2e2"},{k:"warm",label:"● Ấm",color:"#359846",bg:"#ebf5eb"},{k:"cold",label:"● Lạnh",color:"#8DCB74",bg:"#f3faf0"}];
      const cur = tempOpts.find(t=>t.k===f.temp);

      const SectionHead = ({children}) => <h4 style={{fontSize:11,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:0.5,marginBottom:16}}>{children}</h4>;

      return (
        <div onKeyDown={e=>e.key==="Escape"&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
          onClick={e=>e.target===e.currentTarget&&onClose()}>
          <style>{`
            .alm-i:focus{border-color:#23395d!important;box-shadow:0 0 0 3px rgba(35,57,93,.1)}
            .alm-i::placeholder{color:#b0bac7}
            .alm-row:hover{background:#fafbfc}
          `}</style>

          <div style={{width:"100%",maxWidth:1100,height:"90vh",background:"#fff",borderRadius:16,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 20px 50px rgba(0,0,0,0.2)"}}>

            {/* ── Header ── */}
            <div style={{padding:"16px 24px",borderBottom:"1px solid #f1f5f9",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <Avatar name={f.name||"?"} size={40}/>
                <div>
                  <div style={{fontWeight:800,fontSize:13,color:"#94a3b8",marginBottom:2}}>LEAD MỚI</div>
                  <div style={{fontWeight:800,fontSize:17,color:"#1a2d47",minWidth:180,minHeight:22}}>
                    {f.name||<span style={{color:"#cbd5e1",fontWeight:400,fontSize:14}}>Nhập họ tên...</span>}
                  </div>
                </div>
                <span style={{background:"#fef3c7",color:"#b45309",padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:700,marginLeft:8}}>Nhóm A</span>
                <span style={{background:cur.bg,color:cur.color,padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:700}}>
                  {cur.label} • {f.temp==="hot"?85:f.temp==="warm"?65:40}đ
                </span>
                <div style={{display:"flex",gap:6,marginLeft:12}}>
                  {tempOpts.map(t=>(
                    <button key={t.k} onClick={()=>up("temp",t.k)}
                      style={{padding:"5px 12px",borderRadius:7,border:`1.5px solid ${f.temp===t.k?t.color:"#e2e8f0"}`,background:f.temp===t.k?t.bg:"#fff",color:f.temp===t.k?t.color:"#94a3b8",fontSize:11.5,fontWeight:700,cursor:"pointer"}}>
                      {t.label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={onClose}
                  style={{background:"#f1f5f9",border:"none",width:32,height:32,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#64748b"}}>×</button>
              </div>
            </div>

            {/* ── Sub-header ── */}
            <div style={{padding:"10px 24px",background:"#f8fafc",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:20,fontSize:12,flexShrink:0}}>
              <div style={{color:"#94a3b8"}}>Phễu:&nbsp;
                <select className="alm-i" value={f.funnel} onChange={e=>up("funnel",e.target.value)}
                  style={{background:"none",border:"none",fontWeight:700,color:"#1a2d47",cursor:"pointer",outline:"none",fontSize:12,fontFamily:"inherit"}}>
                  {FUNNELS_LIST.map(x=><option key={x}>{x}</option>)}
                </select>
              </div>
              <div style={{color:"#94a3b8"}}>Đội:&nbsp;
                <select className="alm-i" value={f.team} onChange={e=>up("team",e.target.value)}
                  style={{background:"none",border:"none",fontWeight:700,color:"#1a2d47",cursor:"pointer",outline:"none",fontSize:12,fontFamily:"inherit"}}>
                  {["Đội 1","Đội 2","Đội 3","Đội 4"].map(x=><option key={x}>{x}</option>)}
                </select>
              </div>
              <div style={{color:"#94a3b8"}}>Nguồn lead:&nbsp;
                <select className="alm-i" value={f.source} onChange={e=>up("source",e.target.value)}
                  style={{background:"none",border:"none",fontWeight:700,color:"#1a2d47",cursor:"pointer",outline:"none",fontSize:12,fontFamily:"inherit"}}>
                  <option value="">— Chọn —</option>
                  {SOURCES_LIST.map(x=><option key={x}>{x}</option>)}
                </select>
              </div>
              <div style={{color:"#94a3b8"}}>Tư vấn viên:&nbsp;
                <select className="alm-i" value={f.sale} onChange={e=>up("sale",e.target.value)}
                  style={{background:"none",border:"none",fontWeight:700,color:"#1a2d47",cursor:"pointer",outline:"none",fontSize:12,fontFamily:"inherit"}}>
                  <option value="">— Chưa gán —</option>
                  {ADVISORS_LIST.map(x=><option key={x}>{x}</option>)}
                </select>
              </div>
            </div>

            {/* ── Body ── */}
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>

              {/* LEFT */}
              <div style={{flex:1,overflowY:"auto",borderRight:"1px solid #f1f5f9",display:"flex",flexDirection:"column"}}>

                {/* Event banner */}
                <div style={{margin:"20px 24px 0",background:"#eff6ff",border:"1px solid #dbeafe",borderRadius:12,padding:"14px 18px"}}>
                  <div style={{fontSize:10,fontWeight:800,color:"#2563eb",textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Sự kiện tạo lead</div>
                  <select className="alm-i" value={f.event} onChange={e=>up("event",e.target.value)}
                    style={{background:"none",border:"none",fontWeight:700,color:"#1a2d47",fontSize:14,outline:"none",fontFamily:"inherit",cursor:"pointer",width:"100%"}}>
                    {["Điền form nhận tư vấn","Tham gia Mini Game","Đăng ký sự kiện THPT","Tải brochure ngành","Gọi điện hotline","Quét QR tại sự kiện"].map(x=><option key={x}>{x}</option>)}
                  </select>
                </div>

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:32,padding:"20px 24px"}}>
                  {/* Timeline */}
                  <div>
                    <SectionHead>Hành trình xét tuyển</SectionHead>
                    <div style={{position:"relative",paddingLeft:30}}>
                      <div style={{position:"absolute",left:14,top:8,bottom:8,width:2,background:"#f1f5f9"}}/>
                      {[{t:"Điền form nhận tư vấn",s:"Vừa xong",done:true},{t:"Chuyên viên liên hệ",s:"Chờ phân công",done:false},{t:"Phụ huynh nộp hồ sơ",s:"Chưa thực hiện",done:false},{t:"Xác nhận nhập học",s:"Đang chờ duyệt",done:false}].map((s,i)=>(
                        <div key={i} style={{marginBottom:22,position:"relative"}}>
                          <div style={{position:"absolute",left:-30,width:26,height:26,borderRadius:"50%",background:s.done?"#dbeafe":"#fff",border:s.done?"none":"2px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>
                            {s.done?<span style={{color:"#2563eb",fontSize:10,fontWeight:800}}>ON</span>:<div style={{width:6,height:6,borderRadius:"50%",background:"#f1f5f9"}}/>}
                          </div>
                          <div style={{fontSize:13,fontWeight:700,color:s.done?"#1a2d47":"#cbd5e1"}}>{s.t}</div>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{s.s}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Major + docs */}
                  <div>
                    <div style={{marginBottom:28}}>
                      <SectionHead>Nguyện vọng đăng ký</SectionHead>
                      <select className="alm-i" value={f.major} onChange={e=>up("major",e.target.value)}
                        style={{...baseInput,marginBottom:8,fontWeight:700,fontSize:14,color:f.major?"#2563eb":"#94a3b8",cursor:"pointer"}}>
                        <option value="">— Chọn ngành quan tâm —</option>
                        {MAJORS_LIST.map(m=><option key={m}>{m}</option>)}
                      </select>
                      <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>Hình thức: <span style={{color:"#475569",fontWeight:600}}>Xét tuyển học bạ THPT</span></div>
                      <div style={{fontSize:12,color:"#94a3b8"}}>Trạng thái: <span style={{color:"#f59e0b",fontWeight:700}}>Chờ tiếp cận</span></div>
                    </div>
                    <div>
                      <SectionHead>Chiến dịch liên kết</SectionHead>
                      <select className="alm-i" value={f.campaign} onChange={e=>up("campaign",e.target.value)}
                        style={{...baseInput,cursor:"pointer"}}>
                        <option value="">— Không liên kết —</option>
                        {(campaigns||[]).map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                {/* Quick update form */}
                <div style={{marginTop:"auto",borderTop:"1px solid #f1f5f9",padding:"20px 24px"}}>
                  <SectionHead>Cập nhật thông tin nhanh</SectionHead>
                  {err.name&&touched.name && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ef4444",fontWeight:600}}>⚠ {err.name}</div>}
                  {err.phone&&touched.phone && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#ef4444",fontWeight:600}}>⚠ {err.phone}</div>}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
                    <div>
                      <label style={lbl}>Tên khách hàng <span style={{color:"#ef4444"}}>*</span></label>
                      <input ref={nameRef} className="alm-i" style={inp("name")} placeholder="VD: Nguyễn Thị Lan" value={f.name}
                        onChange={e=>up("name",e.target.value)} onBlur={()=>touch("name")} tabIndex={1}/>
                    </div>
                    <div>
                      <label style={lbl}>Số điện thoại <span style={{color:"#ef4444"}}>*</span></label>
                      <div style={{position:"relative"}}>
                        <input className="alm-i" style={inp("phone")} placeholder="0901 234 567" value={f.phone} inputMode="tel"
                          onChange={e=>up("phone",fmtPhone(e.target.value.replace(/\s/g,"")))}
                          onBlur={()=>touch("phone")} tabIndex={2}/>
                        {f.phone&&validPhone(f.phone)&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#10b981",fontSize:16}}>✓</span>}
                      </div>
                    </div>
                    <div>
                      <label style={lbl}>Email</label>
                      <input className="alm-i" style={inp("email")} placeholder="vd: lan@gmail.com" value={f.email} type="email"
                        onChange={e=>up("email",e.target.value)} onBlur={()=>touch("email")} tabIndex={3}/>
                    </div>
                    <div>
                      <label style={lbl}>Khu vực</label>
                      <select className="alm-i" style={{...baseInput,cursor:"pointer"}} value={f.province} onChange={e=>up("province",e.target.value)} tabIndex={4}>

          {/* Zia Chat Bubble */}
          <button onClick={() => setIsZiaOpen(!isZiaOpen)} style={{
            position: "fixed", bottom: 24, right: 24, width: 56, height: 56,
            background: "linear-gradient(135deg, #7c3aed, #2563eb)",
            borderRadius: "50%", boxShadow: "0 8px 25px rgba(124,58,237,0.4)",
            border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 1001, transition: "transform .2s"
          }} onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
            <span style={{ display: "flex", color: "#fff" }}><Icon id="automation" size={24} /></span>
            {ziaAlert && <div style={{ position: "absolute", top: -2, right: -2, width: 14, height: 14, background: "#ef4444", borderRadius: "50%", border: "2px solid #fff" }} />}
          </button>

          <ZiaChat isOpen={isZiaOpen} onClose={() => setIsZiaOpen(false)} leads={leads} />
          {selLead && <Profile360 lead={selLead} onClose={() => setSelLead(null)} onSave={(updated) => { setLeads(prev => prev.map(l => l.id === updated.id ? updated : l)); setSelLead(null); }} />}
          {showAddLead && (
            <AddLeadModal
              campaigns={campaigns}
              onClose={() => setShowAddLead(false)}
              onSaveNew={(lead) => {
                setLeads(prev => [lead, ...prev]);
                setShowAddLead(false);
                setTimeout(() => setShowAddLead(true), 50);
              }}
              onSaveView={(lead) => {
                setLeads(prev => [lead, ...prev]);
                setShowAddLead(false);
                setSelLead(lead);
              }}
            />
          )}
        </div>
      );
    }


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

</html>
