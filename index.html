    const DonutChart = ({ data, size = 100 }) => {
      const total = data.reduce((s, d) => s + d.value, 0);
      let cum = 0; const r = size / 2 - 9, cx = size / 2, cy = size / 2;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {data.map((d, i) => { const pct = d.value / total, dash = 2 * Math.PI * r * pct, gap = 2 * Math.PI * r - dash, rot = cum * 360 - 90; cum += pct; return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={14} strokeDasharray={`${dash} ${gap}`} transform={`rotate(${rot} ${cx} ${cy})`} style={{ transition: "all .5s" }} />; })}

                  <div style={{ marginBottom: 14 }}>
                    <h1 style={{ fontSize: 17, fontWeight: 700, color: N[800], marginBottom: 3, letterSpacing: 0.1 }}>Pipeline Tuyển Sinh</h1>
                    <p style={{ fontSize: 12, color: "#8c96a6", fontWeight: 400 }}>{filtered.length} leads đang theo dõi · Kéo thả để chuyển giai đoạn</p>
                  </div>
                  <StatsBar leads={leads} />
                  <KanbanView leads={filtered} onLeadClick={setSelLead} />
                </>
              )}

              {page === "settings" && (
                <>
                  <div style={{ marginBottom: 18, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <h1 style={{ fontSize: 18, fontWeight: 800, color: "#1a2d47", marginBottom: 3 }}>Cấu hình CRM</h1>
                      <p style={{ fontSize: 12, color: "#8c96a6" }}>Quản trị hệ thống · Thiết lập phễu & quy tắc chấm điểm</p>
                    </div>
                    <button onClick={() => setPage("pipeline")} style={{ background: "#f1f5f9", border: "none", padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 600, color: "#64748b", cursor: "pointer" }}>Đóng x</button>
                  </div>
                </>
              )}

              {page === "profiles" && (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, borderBottom: "1px solid #E6E8EC", paddingBottom: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 24 }}>
                      <div style={{ display: "flex", gap: 20 }}>
                        <button 
                          onClick={() => setMgmtCategory("all")}
                          style={{ 
                            background: "transparent", border: "none", 
                            color: mgmtCategory === "all" ? "#1a2d47" : "#64748b", 
                            fontSize: 13, fontWeight: mgmtCategory === "all" ? 800 : 600, 
                            cursor: "pointer", display: "flex", alignItems: "center", gap: 8, 
                            padding: "4px 0", position: "relative" 
                          }}
                        >
                          Tất cả lead <span style={{ background: mgmtCategory === "all" ? "#eff6ff" : "#f1f5f9", color: mgmtCategory === "all" ? "#2563eb" : "#64748b", padding: "1px 8px", borderRadius: 10, fontSize: 10.5, fontWeight: 700 }}>17</span>
                          {mgmtCategory === "all" && <div style={{ position: "absolute", bottom: -13, left: 0, right: 0, height: 2, background: "#2563eb" }} />}
                        </button>
                        <button 
                          onClick={() => setMgmtCategory("unassigned")}
                          style={{ 
                            background: "transparent", border: "none", 
                            color: mgmtCategory === "unassigned" ? "#1a2d47" : "#64748b", 
                            fontSize: 13, fontWeight: mgmtCategory === "unassigned" ? 800 : 600, 
                            cursor: "pointer", display: "flex", alignItems: "center", gap: 8, 
                            padding: "4px 0", position: "relative" 
                          }}
                        >
                          Chưa phân công <span style={{ background: "#ef4444", color: "#fff", padding: "1px 8px", borderRadius: 10, fontSize: 10.5, fontWeight: 700 }}>3</span>
                          {mgmtCategory === "unassigned" && <div style={{ position: "absolute", bottom: -13, left: 0, right: 0, height: 2, background: "#2563eb" }} />}
                        </button>
                      </div>
                      <div style={{ width: 1, height: 16, background: "#E6E8EC" }} />
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#ef4444" }}>Tổng DS dự kiến: 273.000.000 đ</span>
                    </div>
                  </div>
                  <LeadManagementView leads={leads} onLeadClick={setSelLead} category={mgmtCategory} />
                </>
              )}


              {page === "ai_hub" && <ZiaAIHubView onLeadClick={setSelLead} />}
              {page === "survey" && <SurveyView />}
              {page === "scoring" && <LeadScoringView leads={leads} onLeadClick={setSelLead} />}
              {page === "automation" && <AutomationView leads={leads} onLeadClick={setSelLead} />}
              {page === "reports" && <CDPDashboardView />}
              {page === "marketing_funnel" && <MarketingFunnelView onOpenLeads={() => { setPage("profiles"); setSearch(""); setFilterSrc("all"); setFilterTemp("all"); }} />}
              {page === "settings" && <CRMSettingsView />}
            </div>
          </div>

          {ziaAlert && (
            <div style={{ position: "fixed", top: 24, right: 24, width: 320, background: "#fff", borderRadius: 16, boxShadow: "0 10px 40px rgba(15,39,68,0.15)", border: "1px solid #E6E8EC", borderLeft: `4px solid ${ziaAlert.type === 'warning' ? '#f5a623' : '#10b981'}`, padding: 16, zIndex: 2000, animation: "slideIn .3s ease-out" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontWeight: 800, fontSize: 12, color: ziaAlert.type === 'warning' ? '#f5a623' : '#10b981' }}>ZIA ALERT</span>
                <button onClick={() => setZiaAlert(null)} style={{ background: "none", border: "none", cursor: "pointer", color: "#94a3b8" }}>×</button>
              </div>
              <div style={{ fontWeight: 700, fontSize: 13, color: N[800], marginBottom: 4 }}>{ziaAlert.title}</div>
              <div style={{ fontSize: 11.5, color: "#64748b", lineHeight: 1.5, marginBottom: 12 }}>{ziaAlert.text}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => { setIsZiaOpen(true); setZiaAlert(null); }} style={{ background: N[800], color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Hỏi Zia</button>
                <button onClick={() => setZiaAlert(null)} style={{ background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Bỏ qua</button>
              </div>
            </div>
          )}

          {/* Zia Chat Bubble */}
          <button onClick={() => setIsZiaOpen(!isZiaOpen)} style={{
            position: "fixed", bottom: 24, right: 24, width: 56, height: 56,
            background: "linear-gradient(135deg, #7c3aed, #2563eb)",
            borderRadius: "50%", boxShadow: "0 8px 25px rgba(124,58,237,0.4)",
            border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 1001, transition: "transform .2s"
          }} onMouseEnter={e => e.currentTarget.style.transform = "scale(1.1)"} onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
            <span style={{ fontSize: 24 }}>🤖</span>
            {ziaAlert && <div style={{ position: "absolute", top: -2, right: -2, width: 14, height: 14, background: "#ef4444", borderRadius: "50%", border: "2px solid #fff" }} />}
          </button>

          <ZiaChat isOpen={isZiaOpen} onClose={() => setIsZiaOpen(false)} leads={leads} />
          {selLead && <Profile360 lead={selLead} onClose={() => setSelLead(null)} />}
        </div>
      );
    }


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

</html>
