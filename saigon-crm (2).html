      { id: "L004", name: "Phạm Minh Đức", phone: "0934567890", school: "THPT Trần Phú", province: "TP.HCM", major: "Thiết kế đồ họa", source: "Hotline", sale: "Minh Tú", temp: "hot", updated: "30 phút trước", score: 91, stage: "da_lien_he", color: "#7c3aed", daysNoCall: 0, daysNoEngage: 0 },
      { id: "L005", name: "Hoàng Thị Mai", phone: "0945678901", school: "THPT Gia Định", province: "TP.HCM", major: "Quản trị kinh doanh", source: "Zalo", sale: "Hồng Nhung", temp: "warm", updated: "3 giờ trước", score: 68, stage: "quan_tam", color: "#f5a623", daysNoCall: 3, daysNoEngage: 3 },
      { id: "L006", name: "Vũ Quang Tuấn", phone: "0956789012", school: "THPT Bình Phú", province: "Long An", major: "Công nghệ thông tin", source: "Mini App", sale: "Văn Nam", temp: "hot", updated: "1 giờ trước", score: 88, stage: "quan_tam", color: "#00b4a0", daysNoCall: 0, daysNoEngage: 0 },

      { id: "L008", name: "Bùi Văn Long", phone: "0978901234", school: "THPT An Lạc", province: "TP.HCM", major: "Kỹ thuật xây dựng", source: "TikTok", sale: "Hồng Nhung", temp: "hot", updated: "45 phút trước", score: 93, stage: "tu_van", color: "#f5a623", daysNoCall: 0, daysNoEngage: 0 },
      { id: "L009", name: "Ngô Thị Kiều", phone: "0989012345", school: "THPT Lê Quý Đôn", province: "Tiền Giang", major: "Điều dưỡng", source: "Hotline", sale: "Văn Nam", temp: "warm", updated: "2 ngày trước", score: 62, stage: "nop_ho_so", color: "#2563eb", daysNoCall: 5, daysNoEngage: 8 },
      { id: "L010", name: "Phan Văn Khoa", phone: "0990123456", school: "THPT Nguyễn Trãi", province: "TP.HCM", major: "Công nghệ thực phẩm", source: "Website", sale: "Minh Tú", temp: "hot", updated: "20 phút trước", score: 95, stage: "dong_hoc_phi", color: "#16a34a", daysNoCall: 0, daysNoEngage: 0 },

    const STAGES = [

    const WORKFLOWS_INIT = [

      { id: "wf3", name: "Gửi ưu đãi – 7 ngày không tương tác", status: "active", triggered: 4, icon: "🎁", color: "#7c3aed", condition: { type: "days_no_engage", value: 7, label: "7 ngày không tương tác" }, action: { label: "Tự động gửi voucher ưu đãi qua Zalo/FB" } },

      { q: "Bạn phát hiện một lỗi logic nghiêm trọng trong hệ thống khi chỉ còn 2 giờ là deadline?", opts: ["Báo cáo ngay và xin gia hạn deadline", "Tập trung sửa chữa và làm thêm giờ", "Patch tạm thời để chạy demo"] },
      { q: "Ngân sách marketing bị cắt giảm 50%, sếp yêu cầu vẫn giữ nguyên KPI?", opts: ["Tối ưu hóa các kênh marketing miễn phí", "Đề xuất cắt giảm các mục tiêu kém hiệu quả", "Tìm kiếm các đối tác tiềm năng để collab"] },
      { q: "Dữ liệu khảo sát người dùng cho thấy sản phẩm hiện tại quá khó dùng?", opts: ["Tổ chức buổi workshop đóng góp ý kiến", "Lên kế hoạch redesign toàn bộ UI/UX", "Phát triển bộ hướng dẫn chi tiết (Manuals)"] },
    ];

    const QUIZ_RESULTS = [
      { major: "Công nghệ thông tin", match: 92, desc: "Phù hợp với tư duy logic, yêu thích công nghệ", icon: "💻" },
      { major: "Điều dưỡng", match: 88, desc: "Có thiên hướng chăm sóc & y tế cộng đồng", icon: "🏥" },
      { major: "Kế toán – Kiểm toán", match: 85, desc: "Giỏi phân tích số liệu, tư duy tài chính", icon: "📊" },
      { major: "Thiết kế đồ họa", match: 79, desc: "Sáng tạo cao, có gu thẩm mỹ tốt", icon: "🎨" },
    ];

    /* ── helpers ── */
    // Avatar — navy monochrome palette, no vivid colors
    const Avatar = ({ name, size = 40 }) => {
      const shades = ["#0f2744", "#1a3a5c", "#2e5c8a", "#3f72a4", "#5b84b1", "#7a9ebb"];
      const bg = shades[name.charCodeAt(0) % shades.length];
      return <div style={{ width: size, height: size, borderRadius: "50%", background: bg, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: size * .38, flexShrink: 0, border: "2px solid rgba(255,255,255,.9)" }}>{name.charAt(0)}</div>;
    };

    const TempBadge = ({ temp }) => {
      const m = { hot: "● Nóng", warm: "● Ấm", cold: "● Lạnh" };
      const color = getTempColor(temp);
      return <span style={{ background: `${color}15`, color: color, borderRadius: 20, padding: "2px 9px", fontSize: 10.5, fontWeight: 600, whiteSpace: "nowrap", letterSpacing: 0.1 }}>{m[temp] || m.cold}</span>;
    };

    const ScoreRing = ({ score, temp, size = 38 }) => {
      const color = getTempColor(temp);
      return (
        <div style={{ width: size, height: size, borderRadius: "50%", background: `conic-gradient(${color} ${score * 3.6}deg,#e8ecf0 ${score * 3.6}deg)`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <div style={{ width: size - 10, height: size - 10, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: color }}>{score}</div>
        </div>
      );
    };

    const DonutChart = ({ data, size = 100 }) => {
      const total = data.reduce((s, d) => s + d.value, 0);
      let cum = 0; const r = size / 2 - 9, cx = size / 2, cy = size / 2;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {data.map((d, i) => { const pct = d.value / total, dash = 2 * Math.PI * r * pct, gap = 2 * Math.PI * r - dash, rot = cum * 360 - 90; cum += pct; return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={14} strokeDasharray={`${dash} ${gap}`} transform={`rotate(${rot} ${cx} ${cy})`} style={{ transition: "all .5s" }} />; })}
        </svg>
      );
    };

    /* ── Kanban ── */
    const LeadCard = ({ lead, onClick }) => (
      <div onClick={() => onClick(lead)} style={{ background: "#fff", borderRadius: 12, padding: "13px 14px", marginBottom: 9, cursor: "pointer", boxShadow: "0 4px 12px rgba(0,0,0,0.04)", border: "1px solid #E6E8EC", transition: "all .2s", position: "relative" }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 8px 20px rgba(0,0,0,0.08)"; e.currentTarget.style.transform = "translateY(-1px)" }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow = "0 4px 12px rgba(0,0,0,0.04)"; e.currentTarget.style.transform = "translateY(0)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 9 }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <Avatar name={lead.name} size={32} />
            <div>
              <div style={{ fontWeight: 700, fontSize: 12.5, color: "#0f2744" }}>{lead.name}</div>
              <div style={{ fontSize: 10.5, color: "#8c96a6" }}>{lead.phone}</div>
            </div>
          </div>
          <ScoreRing score={lead.score} temp={lead.temp} size={34} />
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 8 }}>
          <span style={{ background: "#f4f5f7", color: "#4a5568", borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 500, border: "1px solid #e8eaed" }}>🏫 {lead.school}</span>
          <span style={{ background: "#f4f5f7", color: "#4a5568", borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 500, border: "1px solid #e8eaed" }}>📚 {lead.major}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 10.5, color: "#9ba8b7" }}>📡 {lead.source}</span>
          <TempBadge temp={lead.temp} />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 9, paddingTop: 8, borderTop: "1px solid #f1f3f5" }}>
          <span style={{ fontSize: 10, color: "#9ba8b7" }}>👤 {lead.sale}</span>
          <span style={{ fontSize: 10, color: "#9ba8b7" }}>🕐 {lead.updated}</span>
        </div>
      </div>
    );

    const KanbanView = ({ leads, onLeadClick }) => (
      <div style={{ display: "flex", gap: 11, overflowX: "auto", paddingBottom: 16 }}>
        {STAGES.map(st => {
          const sl = leads.filter(l => l.stage === st.key);
          return (
            <div key={st.key} style={{ minWidth: 228, maxWidth: 228, flexShrink: 0 }}>
              <div style={{ background: "#fff", borderRadius: "9px 9px 0 0", padding: "9px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", border: "1px solid #E6E8EC", borderBottom: "none" }}>
                <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: st.dot, flexShrink: 0 }} />
                  <span style={{ color: N[800], fontWeight: 600, fontSize: 11.5 }}>{st.label}</span>
                </div>
                <span style={{ background: N[50], color: "#6b7a90", borderRadius: 20, padding: "1px 8px", fontSize: 10.5, fontWeight: 600, border: "1px solid #E6E8EC" }}>{sl.length}</span>
              </div>
              <div style={{ background: "#f7f8fa", borderRadius: "0 0 9px 9px", padding: "9px", minHeight: 180, overflowY: "auto", border: "1px solid #E6E8EC", borderTop: "none" }}>
                {sl.map(lead => <LeadCard key={lead.id} lead={lead} onClick={onLeadClick} />)}
                {!sl.length && <div style={{ textAlign: "center", color: "#c9d0da", padding: "28px 0", fontSize: 11.5 }}>Chưa có lead</div>}
              </div>
            </div>
          );
        })}
      </div>

    const StatsBar = ({ leads }) => {
      const hot = leads.filter(l => l.temp === "hot").length;
      const avg = Math.round(leads.reduce((s, l) => s + l.score, 0) / leads.length);
      const enrolled = leads.filter(l => l.stage === "nhap_hoc").length;
      const cards = [
        { icon: "👥", label: "Tổng Lead", val: leads.length, sub: "đang theo dõi", highlight: false },
        { icon: "🔥", label: "Lead Nóng", val: hot, sub: `${Math.round(hot / leads.length * 100)}% tổng số`, highlight: false },

              <div style={{ fontSize: 28, fontWeight: 800, color: "#0f2744", lineHeight: 1 }}>{val}</div>
              <div style={{ fontSize: 10.5, color: "#adb5bd", marginTop: 5 }}>{sub}</div>

    /* ── Profile 360 ── */
    const Profile360 = ({ lead, onClose }) => {
      const [tab, setTab] = useState("overview");

      // Desaturated navy palette — 3 sắc độ navy khác nhau + 2 muted
      const channels = [
        { label: "Facebook", value: 44, color: "#2563eb" }, // Royal Blue
        { label: "Zalo", value: 28, color: "#0ea5e9" }, // Sky Blue
        { label: "Website", value: 14, color: "#06b6d4" }, // Cyan
        { label: "Mini App", value: 8, color: "#3b82f6" }, // Bright Blue
        { label: "Hotline", value: 6, color: "#60a5fa" }, // Light Blue
      ];

      const timeline = [
        { t: "2 giờ trước", icon: "💬", desc: "Chat Facebook – Hỏi học bổng ngành CNTT" },
        { t: "1 ngày trước", icon: "📞", desc: "Gọi điện – Tư vấn ngành, 8 phút" },
        { t: "2 ngày trước", icon: "🎫", desc: "Nhận voucher giảm 500K học phí kỳ 1" },

                    </div>
                    {/* Arrow */}
                    <div style={{ display: "flex", alignItems: "center", color: "#c9d0da", fontSize: 18, flexShrink: 0 }}>→</div>
                    {/* THEN */}
                    <div style={{ background: "#fff", border: "1px solid rgba(15,39,68,0.14)", borderRadius: 8, padding: "9px 14px", flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                      <div style={{ fontSize: 9.5, fontWeight: 700, color: "#9ba8b7", letterSpacing: 1, marginBottom: 2 }}>THEN</div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#0f2744" }}>{wf.action.label}</div>
                    </div>
                  </div>

                  {/* Affected leads */}
                  {aff.length > 0 && (
                    <div style={{ marginTop: 4 }}>
                      <div style={{ fontSize: 11.5, fontWeight: 600, color: "#4a5568", marginBottom: 7 }}>
                        {aff.length} lead đang kích hoạt điều kiện
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                        {aff.slice(0, 5).map(l => (
                          <div key={l.id} style={{ display: "flex", gap: 6, alignItems: "center", background: "#f4f5f7", border: "1px solid #E6E8EC", borderRadius: 7, padding: "4px 10px" }}>
                            <Avatar name={l.name} size={17} />
                            <span style={{ fontSize: 11, fontWeight: 600, color: "#0f2744" }}>{l.name}</span>
                          </div>
                        ))}
                        {aff.length > 5 && <div style={{ background: "#f4f5f7", border: "1px solid #E6E8EC", borderRadius: 7, padding: "4px 10px", fontSize: 11, color: "#8c96a6" }}>+{aff.length - 5} khác</div>}
                      </div>
                    </div>
                  )}
                  {aff.length === 0 && isActive && (
                    <div style={{ fontSize: 11.5, color: "#9ba8b7", background: "#f7f8fa", borderRadius: 8, padding: "8px 12px" }}>
                      Không có lead nào đang kích hoạt điều kiện này
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    /* ── APP ── */
    function App() {
      const [page, setPage] = useState("pipeline");
      const [leads] = useState(LEADS_INIT);
      const [selLead, setSelLead] = useState(null);
      const [search, setSearch] = useState("");
      const [filterSrc, setFilterSrc] = useState("all");
      const [filterTemp, setFilterTemp] = useState("all");
      const [col, setCol] = useState(false);

      const filtered = leads.filter(l => {
        const ms = !search || l.name.toLowerCase().includes(search.toLowerCase()) || l.phone.includes(search);
        return ms && (filterSrc === "all" || l.source === filterSrc) && (filterTemp === "all" || l.temp === filterTemp);
      });

      const inputStyle = { border: "1px solid #E6E8EC", borderRadius: 8, padding: "7px 13px", fontSize: 12, background: "#fff", cursor: "pointer", outline: "none", color: N[800] };

      return (
        <div style={{ display: "flex", height: "100vh", fontFamily: "'Inter','Segoe UI',sans-serif", background: N[50], overflow: "hidden" }}>
          <style>{`
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:#d4dfe9;border-radius:2px}
        button:focus{outline:none}
      `}</style>

          {/* ── Sidebar ── */}
          <div style={{ width: col ? 56 : 210, background: N[900], transition: "width .25s ease", flexShrink: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>

            {/* Logo */}
            <div style={{ padding: col ? "18px 0" : "18px 16px", borderBottom: "1px solid rgba(255,255,255,.06)", display: "flex", alignItems: "center", gap: 10, justifyContent: col ? "center" : "flex-start" }}>
              <div style={{ width: 32, height: 32, background: "rgba(255,255,255,.1)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#fff" }}>
                <Icon id="grad" size={16} />
              </div>
              {!col && (
                <div>
                  <div style={{ color: "#fff", fontWeight: 700, fontSize: 13, letterSpacing: 0.3 }}>SGC CRM</div>
                  <div style={{ color: "rgba(255,255,255,.3)", fontSize: 9.5, marginTop: 1 }}>Cao Đẳng Sài Gòn</div>
                </div>
              )}
            </div>

            {/* Nav items */}
            <nav style={{ flex: 1, padding: "10px 8px", overflowY: "auto" }}>
              {NAV_ITEMS.map(n => {
                const active = page === n.key;
                return (
                  <button key={n.key} onClick={() => setPage(n.key)} style={{
                    width: "100%", display: "flex", alignItems: "center", gap: 9,
                    padding: col ? "9px 0" : "9px 10px",
                    justifyContent: col ? "center" : "flex-start",
                    marginBottom: 2,
                    background: active ? "rgba(255,255,255,.08)" : "transparent",
                    border: "none", borderRadius: 7, cursor: "pointer",
                    color: active ? "#fff" : "rgba(255,255,255,.38)",
                    textAlign: "left", transition: "all .15s"
                  }}
                    onMouseEnter={e => { if (!active) e.currentTarget.style.color = "rgba(255,255,255,.65)"; }}
                    onMouseLeave={e => { if (!active) e.currentTarget.style.color = "rgba(255,255,255,.38)"; }}
                  >
                    <Icon id={n.icon} size={15} />
                    {!col && <span style={{ fontSize: 12, fontWeight: active ? 600 : 400, whiteSpace: "nowrap", letterSpacing: 0.1 }}>{n.label}</span>}
                  </button>
                );
              })}
            </nav>

            {/* Footer */}
            <div style={{ padding: "10px 8px", borderTop: "1px solid rgba(255,255,255,.06)" }}>
              <button onClick={() => setCol(!col)} style={{ width: "100%", background: "transparent", border: "none", color: "rgba(255,255,255,.25)", padding: "7px", borderRadius: 7, cursor: "pointer", display: "flex", justifyContent: "center" }}>
                <Icon id={col ? "expand" : "collapse"} size={14} />
              </button>
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: col ? "8px 0 0" : "8px 2px 0", justifyContent: col ? "center" : "flex-start" }}>
                <div style={{ width: 26, height: 26, background: "rgba(255,255,255,.12)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,.7)", fontSize: 11, fontWeight: 600, flexShrink: 0 }}>A</div>
                {!col && <div><div style={{ color: "rgba(255,255,255,.65)", fontSize: 11, fontWeight: 500 }}>Admin</div><div style={{ color: "rgba(255,255,255,.25)", fontSize: 9.5 }}>Quản trị viên</div></div>}
              </div>
            </div>
          </div>

          {/* ── Main ── */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

            {/* Topbar */}
            <div style={{ background: "#fff", padding: "10px 20px", borderBottom: "1px solid #E6E8EC", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flex: 1 }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm SĐT, họ tên, mã lead…"
                  style={{ ...inputStyle, width: 260, cursor: "text" }} />
                <select value={filterSrc} onChange={e => setFilterSrc(e.target.value)} style={inputStyle}>
                  <option value="all">Tất cả nguồn</option>
                  {["Facebook", "TikTok", "Zalo", "Hotline", "Website", "Mini App"].map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <select value={filterTemp} onChange={e => setFilterTemp(e.target.value)} style={inputStyle}>
                  <option value="all">Nhiệt độ Lead</option>
                  <option value="hot">Nóng</option>
                  <option value="warm">Ấm</option>
                  <option value="cold">Lạnh</option>
                </select>
              </div>
              <div style={{ display: "flex", gap: 7 }}>
                <button style={{ background: "#fff", border: "1px solid #E6E8EC", borderRadius: 8, padding: "7px 14px", fontSize: 11.5, fontWeight: 500, cursor: "pointer", color: "#6b7a90" }}>Import Excel</button>
                <button style={{ background: N[800], border: "none", borderRadius: 8, padding: "7px 16px", fontSize: 11.5, fontWeight: 600, cursor: "pointer", color: "#fff", letterSpacing: 0.2 }}>+ Thêm Lead</button>
              </div>
            </div>

            {/* Content area */}
            <div style={{ flex: 1, overflowY: "auto", padding: "18px 20px" }}>

              {page === "pipeline" && (
                <>
                  <div style={{ marginBottom: 14 }}>
                    <h1 style={{ fontSize: 17, fontWeight: 700, color: N[800], marginBottom: 3, letterSpacing: 0.1 }}>Pipeline Tuyển Sinh</h1>
                    <p style={{ fontSize: 12, color: "#8c96a6", fontWeight: 400 }}>{filtered.length} leads đang theo dõi · Kéo thả để chuyển giai đoạn</p>
                  </div>
                  <StatsBar leads={leads} />
                  <KanbanView leads={filtered} onLeadClick={setSelLead} />
                </>
              )}

              {page === "profiles" && (
                <>
                  <div style={{ marginBottom: 16 }}>
                    <h1 style={{ fontSize: 17, fontWeight: 700, color: N[800], marginBottom: 3 }}>Hồ Sơ Khách Hàng 360°</h1>
                    <p style={{ fontSize: 12, color: "#8c96a6" }}>Phân tích hành vi học sinh theo kênh tương tác</p>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(290px,1fr))", gap: 12 }}>
                    {filtered.map(lead => {
                      const ch = [{ value: 44, color: "#2563eb" }, { value: 28, color: "#0ea5e9" }, { value: 14, color: "#06b6d4" }, { value: 14, color: "#3b82f6" }];
                      const cls = lead.score >= 80 ? "Promising" : lead.score >= 60 ? "Loyal" : "At Risk";
                      return (
                        <div key={lead.id} onClick={() => setSelLead(lead)}
                          style={{ background: "#fff", borderRadius: 11, padding: 16, cursor: "pointer", transition: "box-shadow .15s", border: "1px solid #E6E8EC" }}
                          onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 16px rgba(15,39,68,0.08)"}
                          onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                            <div style={{ display: "flex", gap: 9, alignItems: "center" }}>
                              <Avatar name={lead.name} size={38} />
                              <div>
                                <div style={{ fontWeight: 600, fontSize: 13, color: N[800] }}>{lead.name}</div>
                                <div style={{ fontSize: 11, color: "#9ba8b7", marginTop: 1 }}>{lead.phone}</div>
                              </div>
                            </div>
                            <span style={{ background: N[50], color: "#6b7a90", borderRadius: 5, padding: "2px 9px", fontSize: 10.5, fontWeight: 500, height: "fit-content", border: "1px solid #E6E8EC" }}>{cls}</span>
                          </div>
                          <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 12, padding: "12px", background: N[50], borderRadius: 8, border: "1px solid #E6E8EC" }}>
                            <DonutChart data={ch} size={68} />
                            <div style={{ flex: 1 }}>
                              {ch.map((item, idx) => (
                                <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: item.color }} />
                                    <span style={{ fontSize: 9.5, color: "#6b7a90" }}>{["Facebook", "Zalo", "Web", "App"][idx]}</span>
                                  </div>
                                  <span style={{ fontSize: 9.5, fontWeight: 700, color: N[800] }}>{item.value}%</span>
                                </div>
                              ))}
                            </div>
                          </div>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: "1px solid #E6E8EC", paddingTop: 10 }}>
                            <TempBadge temp={lead.temp} />
                            <span style={{ fontSize: 10.5, color: "#9ba8b7" }}>Score <strong style={{ color: getTempColor(lead.temp) }}>{lead.score}</strong></span>
                            <span style={{ fontSize: 10.5, color: "#c9d0da" }}>Xem →</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {page === "minigame" && <MiniGameView />}
              {page === "survey" && <SurveyView />}
              {page === "miniapp" && <MiniAppView />}
              {page === "scoring" && <LeadScoringView leads={leads} />}
              {page === "automation" && <AutomationView leads={leads} />}
              {page === "reports" && <CDPDashboardView />}
            </div>
          </div>

          {selLead && <Profile360 lead={selLead} onClose={() => setSelLead(null)} />}
        </div>
      );
    }


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>

</html>
